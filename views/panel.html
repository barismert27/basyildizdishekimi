<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli | Dr. Muhammed Emin Başyıldız</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="/video/logo.png" type="image/jpeg">
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="panel-topbar">
        <div class="panel-topbar-inner">
            <div class="logo-container">
                <img src="/video/logo.png" alt="Logo" class="logo-img">
                <div class="panel-brand">
                    <h1 class="logo">Dr. Muhammed Emin Başyıldız<span>.</span></h1>
                    <span class="panel-brand-sub">Yönetim Paneli</span>
                </div>
            </div>
            <nav class="panel-nav-actions">
                <a href="/index.html" class="panel-nav-link">
                    <i class="fa-solid fa-arrow-left"></i>
                    Siteye Dön
                </a>
                <button id="logout-btn" class="panel-nav-link panel-nav-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Çıkış
                </button>
            </nav>
        </div>
    </header>

    <main class="main panel-main">
        <div class="page active">
            <div class="panel-container">

                <!-- STATS -->
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-icon-wrap stat-icon-total">
                            <i class="fa-solid fa-calendar-check"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-val" id="toplam-randevu">0</span>
                            <span class="stat-key">Toplam Randevu</span>
                        </div>
                    </div>
                    <div class="stat-box pending">
                        <div class="stat-icon-wrap stat-icon-pending">
                            <i class="fa-solid fa-hourglass-half"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-val" id="bekleyen-randevu">0</span>
                            <span class="stat-key">Bekleyen</span>
                        </div>
                    </div>
                    <div class="stat-box approved">
                        <div class="stat-icon-wrap stat-icon-approved">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-val" id="onaylanan-randevu">0</span>
                            <span class="stat-key">Onaylanan</span>
                        </div>
                    </div>
                </div>

                <!-- GÖRÜNÜM DEĞİŞTİRİCİ (TABS) -->
                <div class="panel-view-tabs">
                    <button class="view-tab-btn active" data-view="agenda" id="tab-agenda-btn">
                        <i class="fa-solid fa-list-ul"></i>
                        <span>Ajanda / Liste Görünümü</span>
                    </button>
                    <button class="view-tab-btn" data-view="calendar" id="tab-calendar-btn">
                        <i class="fa-solid fa-calendar-days"></i>
                        <span>Takvim Görünümü</span>
                    </button>
                </div>

                <!-- KONTROL BARI -->
                <div class="panel-toolbar" id="panel-toolbar-el">
                    <div class="kontrol-arama">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="arama-input" placeholder="Hasta adı veya telefon ara..."
                            autocomplete="off">
                    </div>
                    <div class="panel-filters">
                        <div class="filtre-group">
                            <i class="fa-solid fa-filter filtre-icon"></i>
                            <select id="durum-filtre">
                                <option value="">Tüm Durumlar</option>
                                <option value="approved">Onaylanan</option>
                                <option value="pending">Bekleyen</option>
                                <option value="cancelled">İptal</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- GÖRÜNÜM İÇERİKLERİ -->
                <div class="panel-view-content">
                    <!-- 1. AJANDA / LİSTE GÖRÜNÜMÜ -->
                    <div id="view-agenda" class="view-panel-pane active">
                        <!-- RANDEVU LİSTESİ -->
                        <div id="randevu-listesi" class="randevu-listesi">
                            <div class="empty-state">Yükleniyor...</div>
                        </div>
                        <!-- SAYFALAMA -->
                        <div id="pagination-container" class="pagination-container"></div>
                    </div>

                    <!-- 2. TAKVİM GÖRÜNÜMÜ -->
                    <div id="view-calendar" class="view-panel-pane">
                        <div class="calendar-container">
                            <div class="calendar-header">
                                <button id="cal-prev-btn" class="cal-nav-btn" type="button"><i class="fa-solid fa-chevron-left"></i></button>
                                <h3 id="cal-month-title" class="cal-month-title">-</h3>
                                <button id="cal-next-btn" class="cal-nav-btn" type="button"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                            <div class="calendar-grid-wrapper">
                                <div class="calendar-weekdays">
                                    <div>Pzt</div><div>Sal</div><div>Çar</div><div>Per</div><div>Cum</div><div>Cmt</div><div>Paz</div>
                                </div>
                                <div id="calendar-days" class="calendar-days-grid"></div>
                            </div>
                        </div>
                        <!-- Takvim Detay Alanı (Mobilde/Masaüstünde tıklanan günün randevuları) -->
                        <div id="calendar-day-details" class="calendar-day-details">
                            <div class="day-details-header">
                                <h4 id="selected-day-title">Randevuları görmek için takvimden bir gün seçin</h4>
                            </div>
                            <div id="selected-day-appointments" class="selected-day-appointments-list">
                                <div class="empty-state-sm">Seçilen gün için randevu bulunmuyor.</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="/script.js?v=3.0"></script>
</body>

</html>
